# Dual-GPU static binding: reference config, not auto-applied.
#
# The actual binding happens via a kernel command-line parameter (see
# scripts/vfio/dual-gpu-static-bind.md), not this file. This file documents
# the equivalent modprobe-level configuration if you prefer that over a
# kernel param, e.g. for testing without rebooting the bootloader config.
#
# Place at /etc/modprobe.d/vfio.conf if used:

options vfio-pci ids=10de:2504,10de:22be
softdep nvidia pre: vfio-pci
softdep nouveau pre: vfio-pci
softdep amdgpu pre: vfio-pci

# Replace the ids= value with your actual passthrough GPU's vendor:device IDs
# from inventory/gpu-decision.md.
