# Barrier / Input Leap server config - runs on the Arch host.
# Install: sudo pacman -S input-leap (or barrier if using the older fork).
# Place at ~/.local/share/input-leap/input-leap.conf or point the app's
# "Configure Server" dialog at this file directly.
#
# Adjust screen names/layout to match physical monitor placement.

section: screens
    archhost:
    aio-worker:
end

section: links
    archhost:
        right = aio-worker
    aio-worker:
        left = archhost
end

section: options
    relativeMouseMoves = false
    screenSaverSync = true
    clipboardSharing = true
end
